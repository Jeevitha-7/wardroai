repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: npm run lint:eslint
        language: system
        pass_filenames: false
      - id: prettier
        name: Prettier format check
        entry: npm run format:check
        language: system
        pass_filenames: false
      - id: biome
        name: Biome lint
        entry: npm run lint:biome
        language: system
        pass_filenames: false
      - id: oxlint
        name: Oxlint
        entry: npm run lint:oxlint
        language: system
        pass_filenames: false
      - id: knip
        name: Knip dead code check
        entry: npm run lint:knip
        language: system
        pass_filenames: false
      - id: typescript
        name: TypeScript type check
        entry: npm run type_check
        language: system
        pass_filenames: false
      - id: wardroai-tests
        name: WardroAI tests
        entry: npm test
        language: system
        pass_filenames: false
